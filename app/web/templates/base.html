<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LeadForge{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    body { background:#0b1020; color:#e5e7eb; }
    .card { background:#151b2e; border:1px solid #233; border-radius:0.75rem; }
  </style>
</head>
<body class="min-h-screen">
  <header class="border-b border-slate-800 bg-[#0d1326]">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="text-xl font-bold tracking-tight">
        ⚡ Lead<span class="text-indigo-400">Forge</span>
      </a>
      <span class="text-xs text-slate-400">AI Outreach Platform</span>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
