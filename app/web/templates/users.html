{% extends "base.html" %}
{% block title %}Users · LeadForge{% endblock %}
{% block content %}
<h1 class="font-display text-3xl font-semibold tracking-tight mb-8">Users</h1>

<div class="card overflow-hidden mb-8">
  <table class="w-full text-sm">
    <thead class="bg-paper text-muted text-left border-b border-line">
      <tr><th class="px-5 py-3 font-medium">Email</th><th class="px-5 py-3 font-medium">Role</th><th class="px-5 py-3 font-medium">Status</th></tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr class="border-t border-line">
        <td class="px-5 py-3">{{ u.email }}{% if u.id == me.id %} <span class="text-xs text-faint">(you)</span>{% endif %}</td>
        <td class="px-5 py-3">
          <span class="badge {{ 'badge-green' if u.role=='admin' else 'badge-gray' }}">{{ u.role }}</span>
        </td>
        <td class="px-5 py-3 text-muted">{{ 'active' if u.active else 'disabled' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<div class="card p-6 max-w-md">
  <h2 class="font-display text-lg font-semibold mb-4">Add a user</h2>
  <form method="post" action="/users" class="space-y-3">
    <input name="email" type="email" placeholder="email" required class="field">
    <input name="password" type="password" placeholder="password" required class="field">
    <select name="role" class="field">
      <option value="member">member</option>
      <option value="admin">admin</option>
    </select>
    <button class="btn">Create user</button>
  </form>
</div>
{% endblock %}
