{% extends "base.html" %}
{% block title %}Users · LeadForge{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Users</h1>

<div class="card overflow-hidden mb-6">
  <table class="w-full text-sm">
    <thead class="bg-[#1b2237] text-slate-400 text-left">
      <tr><th class="px-4 py-3">Email</th><th class="px-4 py-3">Role</th><th class="px-4 py-3">Status</th></tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr class="border-t border-slate-800">
        <td class="px-4 py-3">{{ u.email }}{% if u.id == me.id %} <span class="text-xs text-slate-500">(you)</span>{% endif %}</td>
        <td class="px-4 py-3">{{ u.role }}</td>
        <td class="px-4 py-3 text-slate-400">{{ 'active' if u.active else 'disabled' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<div class="card p-6 max-w-md">
  <h2 class="text-sm font-semibold text-slate-300 mb-3">Add a user</h2>
  <form method="post" action="/users" class="space-y-3">
    <input name="email" type="email" placeholder="email" required
           class="w-full bg-[#0d1326] border border-slate-700 rounded-lg px-3 py-2 text-sm">
    <input name="password" type="password" placeholder="password" required
           class="w-full bg-[#0d1326] border border-slate-700 rounded-lg px-3 py-2 text-sm">
    <select name="role" class="w-full bg-[#0d1326] border border-slate-700 rounded-lg px-3 py-2 text-sm">
      <option value="member">member</option>
      <option value="admin">admin</option>
    </select>
    <button class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm">Create user</button>
  </form>
</div>
{% endblock %}
